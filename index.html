<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAILWIND</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">

:root{
    --color-background: #ffeeff;
    --color-foreground:#001100;

}

.dark{
    --background: #113311;
    --foreground: #ffeeff;

}
        @theme{
            --color-background: var
            (--background);
            --color-foreground: var
            (--foreground);
        }

    </style>
  </head>
  <body class="bg-background text-foreground ">
        <header class="flex justify-between border-b p-2">
             <h1 class="text-[30px] text-red-300 font-bold underline">Hello world!</h1>
            <button class="bg-green-500 cursor-pointer px-4 rounded-x1 hover:bg-orange-500">Cambiar Modo</button> 
        </header>

    <script>
        function cambiarTema(){
            document.documentElement.                classList.toggle("dark")
        }
        </script>

  </body>
</html>
